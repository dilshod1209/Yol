<head>
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          if (typeof originalFetch !== 'function') return;

          var _currentFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() { return _currentFetch; },
            set: function(v) { _currentFetch = v; }
          });
        } catch (e) {}
      })();
      
      // Global error handler to catch script errors and log them more clearly if possible
      window.addEventListener('error', function(event) {
        if (event.message === 'Script error.') {
          console.warn('CORS Script Error detected. Check crossorigin attributes on external scripts.');
        }
      }, true); // Use capture to catch loading errors
    </script>
